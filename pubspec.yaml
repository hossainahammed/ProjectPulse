name: project_pulse
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'


dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  get: ^4.7.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  url_launcher: ^6.3.2
  flutter_local_notifications: ^17.0.0
  percent_indicator: ^4.2.5
  intl: ^0.19.0
  timezone: ^0.9.0
  path_provider: ^2.1.5
  uuid: ^4.5.3
  image_picker: ^1.1.2
  badges: ^3.1.2
  fl_chart: ^0.70.2
  device_preview: ^1.2.0
  firebase_core: ^4.9.0
  cloud_firestore: ^6.4.1
  firebase_auth: ^6.5.1
  google_sign_in: 6.2.1
  firebase_storage: ^13.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.13.1"
  
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13


flutter:

 
